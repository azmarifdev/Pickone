version: '3.8'

services:
    zyslet-client:
        container_name: zyslet-client
        build:
            context: ./zyslet-client
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_BASE_URL: https://server.azmarif.dev
                NEXT_PUBLIC_API_BASE_URL: https://server.azmarif.dev
                NEXT_PUBLIC_GTM_ID: GTM-T6788FFC
                NEXT_PUBLIC_META_PIXEL_ID: 996938129264024
        ports:
            - '4000:4000'
        env_file:
            - .env
        volumes:
            - ./zyslet-client:/client
            - /client/node_modules
            - /client/.next
        networks:
            - zyslet-network
        depends_on:
            - zyslet-backend
        restart: unless-stopped

    zyslet-backend:
        container_name: zyslet-backend
        build:
            context: ./zyslet-server
            dockerfile: Dockerfile
        ports:
            - '5000:5000'
        volumes:
            - ./zyslet-server:/app
            - /app/node_modules
            - /app/dist
            - server-tmp:/tmp
        env_file:
            - .env
        networks:
            - zyslet-network
        restart: unless-stopped

    zyslet-admin:
        container_name: zyslet-admin
        build:
            context: ./zyslet-admin
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_BASE_URL: https://server.azmarif.dev
        ports:
            - '3000:3000'
        env_file:
            - .env
        volumes:
            - ./zyslet-admin:/src
            - /src/node_modules
            - /src/.next
        networks:
            - zyslet-network
        depends_on:
            - zyslet-backend
        restart: unless-stopped

    mongodb:
        image: mongo:latest
        container_name: zyslet-mongodb
        ports:
            - '27017:27017'
        volumes:
            - mongo-data:/data/db
        networks:
            - zyslet-network
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${DB_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
            - MONGO_INITDB_DATABASE=${DB_NAME}
        restart: unless-stopped

    nginx:
        image: nginx:latest
        container_name: zyslet-nginx
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
            - server-tmp:/tmp
            - ./ssl-certs:/etc/nginx/ssl
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        depends_on:
            - zyslet-backend
            - zyslet-client
            - zyslet-admin
        networks:
            - zyslet-network
        restart: unless-stopped

    certbot:
        image: certbot/certbot:latest
        container_name: zyslet-certbot
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        command: certonly --webroot --webroot-path=/var/www/certbot --email admin@azmarif.dev --agree-tos --no-eff-email -d admin.azmarif.dev -d client.azmarif.dev -d server.azmarif.dev
        depends_on:
            - nginx
        networks:
            - zyslet-network

volumes:
    mongo-data:
        driver: local
    server-tmp:
        driver: local

networks:
    zyslet-network:
        driver: bridge
